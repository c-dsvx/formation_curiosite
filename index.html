<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Formation — Apprendre par curiosité</title>
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<script src="assets/data.js"></script>
<script src="assets/app.js"></script>

<!-- ── Accueil ── -->
<div id="accueil-screen" style="display:none">
  <div class="shell">
    <div class="acc-card">
      <h1 id="acc-title"></h1>
      <p id="acc-subtitle" class="acc-sub"></p>
      <div class="acc-divider"></div>
      <p id="acc-desc" class="acc-body"></p>
      <p id="acc-details" class="acc-body"></p>
      <p id="acc-audience" class="acc-body acc-aud"></p>
      <button id="acc-cta" class="btn btn-p acc-cta" onclick="startFormation()"></button>
    </div>
  </div>
</div>

<!-- ── Formation ── -->
<div id="formation-shell" style="display:none">
<div class="shell">
  <div class="mod-nav-wrap">
    <div id="mod-nav"></div>
  </div>
  <div id="mod-header"></div>
  <div class="progress-row">
    <span class="p-label" id="p-label">Introduction</span>
    <div class="p-track"><div class="p-fill" id="p-fill" style="width:0%"></div></div>
    <span class="p-count" id="p-count">0 / 0</span>
  </div>
  <div id="slides-container"></div>
</div>
</div>

</body>
</html>
